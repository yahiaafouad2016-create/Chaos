<!DOCTYPE html>
<html>
<head>
<title>Chaos Panel</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
  text-align: center;
  overflow: hidden;
}

h1 {
  margin-top: 40px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 40px;
}

button {
  margin: 10px;
  padding: 15px 25px;
  font-size: 16px;
  background: lime;
  border: none;
  cursor: pointer;
}

.spin {
  animation: spin 2s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.flash {
  animation: flash 0.1s infinite;
}

@keyframes flash {
  0% { background: black; }
  50% { background: red; }
  100% { background: blue; }
}
</style>
</head>

<body>

<h1>⚠ Chaos Control Panel ⚠</h1>

<div class="container">
  <button onclick="trail()">Mouse Trail</button>
<button onclick="freeze()">Freeze Screen</button>
<button onclick="clock()">Time Warp</button>
<button onclick="noise()">Static Noise</button>
<button onclick="shrink()">Shrink Page</button>
<button onclick="laser()">Laser Mode</button>
  <button onclick="jumpscare()">⚠ DO NOT PRESS ⚠</button>
   <button onclick="rainbow()">Rainbow Mode</button>
<button onclick="dark()">Dark Void</button>
<button onclick="spam()">Spam Text</button>
<button onclick="bounce()">Bounce Screen</button>
<button onclick="tiny()">Tiny Mode</button>
<button onclick="giant()">Giant Mode</button>
<button onclick="cursor()">Crazy Cursor</button>
<button onclick="blur()">Blur Vision</button>
<button onclick="rotate()">Rotate Screen</button>
<button onclick="disappear()">Disappear</button>
  <button onclick="colorParty()">Color Party</button>
<button onclick="typeText()">Typing Effect</button>
<button onclick="darkMode()">Dark Mode</button>
<button onclick="lightMode()">Light Mode</button>
<button onclick="growText()">BIG TEXT</button>
<button onclick="tinyText()">tiny text</button>
<button onclick="randomMove()">Move Button</button>
<button onclick="borderMadness()">Border Madness</button>
<button onclick="emojiSpam()">Emoji Spam</button>
<button onclick="rainbowText()">Rainbow Text</button>
  <button onclick="glitch()">Glitch</button>
  <button onclick="spin()">Spin</button>
  <button onclick="rain()">Matrix Rain</button>
  <button onclick="explode()">Explode Text</button>
  <button onclick="invert()">Invert Colors</button>
  <button onclick="shake()">Shake Screen</button>
  <button onclick="zoom()">Zoom Mode</button>
  <button onclick="ghost()">Ghost Mode</button>
  <button onclick="duplicate()">Duplicate Chaos</button>
  <button onclick="teleport()">Teleport</button>
<button onclick="mirror()">Mirror Mode</button>
<button onclick="glow()">Neon Glow</button>
<button onclick="lines()">Scan Lines</button>
<button onclick="bounce()">Bounce Screen</button>
<button onclick="pixel()">Pixel Mode</button>
<button onclick="wave()">Wave Distortion</button>
<button onclick="spamText()">Text Storm</button>
<button onclick="startSystem()">ENTER SYSTEM</button>
  <button onclick="godMode()" style="position:fixed; bottom:10px; right:10px; background:red;">
☠
</button>
  <button onclick="reset()">RESET</button>
</div>

<script>
function glitch() {
  document.body.classList.toggle("flash");
}

function spin() {
  document.body.classList.toggle("spin");
}

function rain() {
  let rainText = "";
  for (let i = 0; i < 200; i++) {
    rainText += Math.random() > 0.5 ? "0" : "1";
  }
  document.body.innerHTML += "<p>" + rainText + "</p>";
}

function explode() {
  document.body.innerHTML = "<h1>💥 BOOM 💥</h1>";
}

function invert() {
  document.body.style.filter = "invert(1)";
}

function shake() {
  let x = 0;
  setInterval(() => {
    x = x === 0 ? 10 : 0;
    document.body.style.marginLeft = x + "px";
  }, 50);
}

function zoom() {
  document.body.style.transform = "scale(1.5)";
}

function ghost() {
  document.body.style.opacity = "0.3";
}

function duplicate() {
  document.body.innerHTML += document.body.innerHTML;
}

function reset() {
  location.reload();
}
  function colorParty() {
  setInterval(() => {
    document.body.style.background =
      "rgb(" + Math.random()*255 + "," + Math.random()*255 + "," + Math.random()*255 + ")";
  }, 200);
}

function typeText() {
  let text = "ACCESSING SECRET FILES...";
  let i = 0;
  document.body.innerHTML = "<h1 id='typing'></h1>";
  
  let interval = setInterval(() => {
    document.getElementById("typing").innerHTML += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 100);
}

function darkMode() {
  document.body.style.background = "black";
  document.body.style.color = "white";
}

function lightMode() {
  document.body.style.background = "white";
  document.body.style.color = "black";
}

function growText() {
  document.body.style.fontSize = "50px";
}

function tinyText() {
  document.body.style.fontSize = "10px";
}

function randomMove() {
  let btns = document.querySelectorAll("button");
  btns.forEach(btn => {
    btn.style.position = "absolute";
    btn.style.left = Math.random() * window.innerWidth + "px";
    btn.style.top = Math.random() * window.innerHeight + "px";
  });
}

function borderMadness() {
  document.body.style.border = "20px dashed red";
}

function emojiSpam() {
  for (let i = 0; i < 100; i++) {
    let e = document.createElement("div");
    e.innerHTML = "😈";
    e.style.position = "absolute";
    e.style.left = Math.random() * window.innerWidth + "px";
    e.style.top = Math.random() * window.innerHeight + "px";
    document.body.appendChild(e);
  }
}

function rainbowText() {
  let colors = ["red","orange","yellow","green","blue","indigo","violet"];
  let i = 0;
  setInterval(() => {
    document.body.style.color = colors[i % colors.length];
    i++;
  }, 200);
}
function rainbow() {
  let colors = ["red","orange","yellow","green","blue","purple"];
  let i = 0;
  setInterval(() => {
    document.body.style.background = colors[i % colors.length];
    i++;
  }, 200);
}

function dark() {
  document.body.style.background = "black";
  document.body.innerHTML = "<h1>🌑 You are lost in the void...</h1>";
}

function spam() {
  setInterval(() => {
    let p = document.createElement("p");
    p.innerText = "HAHA";
    document.body.appendChild(p);
  }, 100);
}

function bounce() {
  let pos = 0;
  let dir = 1;
  setInterval(() => {
    pos += dir * 10;
    if (pos > 200 || pos < 0) dir *= -1;
    document.body.style.marginTop = pos + "px";
  }, 50);
}

function tiny() {
  document.body.style.transform = "scale(0.3)";
}

function giant() {
  document.body.style.transform = "scale(2)";
}

function cursor() {
  document.body.style.cursor = "crosshair";
}

function blur() {
  document.body.style.filter = "blur(5px)";
}

function rotate() {
  document.body.style.transform = "rotate(180deg)";
}

function disappear() {
  document.body.style.opacity = "0";
}
function jumpscare() {

  // Dark screen instantly
  document.body.innerHTML = "";
  document.body.style.background = "black";

  // Creepy build-up text
  let text = document.createElement("div");
  text.innerHTML = "…accessing…";
  text.style.color = "red";
  text.style.fontSize = "30px";
  text.style.textAlign = "center";
  text.style.marginTop = "200px";
  document.body.appendChild(text);

  // After delay → main scare
  setTimeout(() => {

    document.body.innerHTML = "";

    let scare = document.createElement("div");
    scare.innerHTML = "👁️";
    scare.style.position = "fixed";
    scare.style.top = "50%";
    scare.style.left = "50%";
    scare.style.transform = "translate(-50%, -50%)";
    scare.style.fontSize = "150px";
    scare.style.zIndex = "9999";

    document.body.appendChild(scare);

    // Flicker effect
    let flicker = setInterval(() => {
      scare.style.opacity = Math.random();
    }, 100);

    // Shake effect
    let shake = setInterval(() => {
      document.body.style.marginLeft = (Math.random()*30 - 15) + "px";
    }, 50);

    // End after 2 seconds
    setTimeout(() => {
      clearInterval(flicker);
      clearInterval(shake);
      location.reload();
    }, 2000);

  }, 1500);
}
function trail() {
  document.addEventListener("mousemove", e => {
    let dot = document.createElement("div");
    dot.style.position = "absolute";
    dot.style.width = "5px";
    dot.style.height = "5px";
    dot.style.background = "lime";
    dot.style.left = e.pageX + "px";
    dot.style.top = e.pageY + "px";
    document.body.appendChild(dot);

    setTimeout(() => dot.remove(), 500);
  });
}

function freeze() {
  document.body.style.pointerEvents = "none";
}

function clock() {
  setInterval(() => {
    document.body.innerHTML = "<h1>" + new Date().toLocaleTimeString() + "</h1>";
  }, 1000);
}

function noise() {
  setInterval(() => {
    let n = document.createElement("div");
    n.style.position = "absolute";
    n.style.width = "2px";
    n.style.height = "2px";
    n.style.background = "white";
    n.style.left = Math.random()*window.innerWidth + "px";
    n.style.top = Math.random()*window.innerHeight + "px";
    document.body.appendChild(n);
  }, 5);
}

function shrink() {
  document.body.style.transform = "scale(0.5)";
}

function laser() {
  document.addEventListener("click", e => {
    let beam = document.createElement("div");
    beam.style.position = "absolute";
    beam.style.width = "2px";
    beam.style.height = "100vh";
    beam.style.background = "red";
    beam.style.left = e.pageX + "px";
    beam.style.top = "0";
    document.body.appendChild(beam);

    setTimeout(() => beam.remove(), 300);
  });
}
function godMode() {

  alert("⚠ GOD MODE ACTIVATED ⚠");

  // Activate multiple chaos effects at once
  document.body.classList.add("flash");
  document.body.style.transform = "rotate(180deg) scale(1.2)";
  document.body.style.filter = "invert(1) blur(2px)";

  // Color madness
  setInterval(() => {
    document.body.style.background =
      "rgb(" + Math.random()*255 + "," + Math.random()*255 + "," + Math.random()*255 + ")";
  }, 100);

  // Shake chaos
  setInterval(() => {
    document.body.style.marginLeft = (Math.random()*40 - 20) + "px";
  }, 50);

  // Emoji flood
  setInterval(() => {
    let e = document.createElement("div");
    e.innerHTML = "😈";
    e.style.position = "absolute";
    e.style.left = Math.random()*window.innerWidth + "px";
    e.style.top = Math.random()*window.innerHeight + "px";
    document.body.appendChild(e);
  }, 100);

}
let code = "";

document.addEventListener("keydown", (e) => {
  code += e.key.toLowerCase();

  if (code.includes("god")) {
    godMode();
    code = "";
  }
});
function teleport() {
  document.body.style.transform =
    "translate(" + (Math.random()*500-250) + "px," + (Math.random()*500-250) + "px)";
}

function mirror() {
  document.body.style.transform = "scaleX(-1)";
}

function glow() {
  document.body.style.textShadow = "0 0 20px lime, 0 0 40px lime";
}

function lines() {
  let overlay = document.createElement("div");
  overlay.style.position = "fixed";
  overlay.style.width = "100%";
  overlay.style.height = "100%";
  overlay.style.background = "repeating-linear-gradient(black, black 2px, transparent 2px, transparent 4px)";
  overlay.style.pointerEvents = "none";
  document.body.appendChild(overlay);
}

function bounce() {
  setInterval(() => {
    document.body.style.transform = "translateY(-20px)";
    setTimeout(() => {
      document.body.style.transform = "translateY(0)";
    }, 200);
  }, 400);
}

function pixel() {
  document.body.style.imageRendering = "pixelated";
  document.body.style.transform = "scale(0.8)";
}

function wave() {
  let x = 0;
  setInterval(() => {
    x += 10;
    document.body.style.transform = "skewX(" + Math.sin(x)*20 + "deg)";
  }, 100);
}

function spamText() {
  for (let i = 0; i < 50; i++) {
    let t = document.createElement("div");
    t.innerHTML = "ERROR";
    t.style.position = "absolute";
    t.style.left = Math.random()*window.innerWidth + "px";
    t.style.top = Math.random()*window.innerHeight + "px";
    document.body.appendChild(t);
  }
}
document.addEventListener("click", (e) => {
  if (e.clientX < 50 && e.clientY < 50) {
    alert("👁 SECRET FOUND");
    godMode();
  }
});
let secret = "";

document.addEventListener("keydown", (e) => {
  secret += e.key.toLowerCase();

  if (secret.includes("chaos")) {
    alert("⚠ CHAOS UNLOCKED ⚠");
    explode();
    emojiSpam();
    secret = "";
  }
});
let invisible = document.createElement("div");
invisible.style.position = "fixed";
invisible.style.top = "60%";
invisible.style.left = "40%";
invisible.style.width = "100px";
invisible.style.height = "100px";
invisible.style.opacity = "0";

invisible.onclick = () => {
  alert("😈 You found it");
  glitch();
};

document.body.appendChild(invisible);

function startSystem() {
  let pass = prompt("ENTER PASSWORD:");

  if (pass === "1234") {
    terminal();
  } else {
    alert("ACCESS DENIED");
  }
}

// 💻 Terminal
function terminal() {
  document.body.innerHTML = `
    <h1>💻 TERMINAL</h1>
    <p>Type commands:</p>
    <input id="cmd" placeholder="type command..." style="font-size:20px;">
    <div id="output"></div>
  `;

  document.getElementById("cmd").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      runCommand(this.value);
      this.value = "";
    }
  });
}

// 🧠 Commands
function runCommand(cmd) {
  let out = document.getElementById("output");

if (cmd === "help") {
  out.innerHTML += "<p>Commands: level1, level2, level3, level4, level5, boss</p>";
}

  else if (cmd === "level1") {
    out.innerHTML += "<p>Loading Level 1...</p>";
    level1();
  }

  else if (cmd === "level2") {
    out.innerHTML += "<p>Loading Level 2...</p>";
    level2();
  }
   else if (cmd === "level3") {
    out.innerHTML += "<p>Loading Level 3...</p>";
    level3();
  }

  else if (cmd === "level4") {
    out.innerHTML += "<p>Loading Level 4...</p>";
    level4();
  }

  else if (cmd === "level5") {
    out.innerHTML += "<p>Loading Level 5...</p>";
    level5();
  }

  else if (cmd === "boss") {
    out.innerHTML += "<p>⚠ FINAL BOSS ⚠</p>";
    boss();
  }

  else {
    out.innerHTML += "<p>Unknown command</p>";
  }
}

// 🎮 Level 1 (light chaos)
function level1() {
  document.body.style.background = "black";

  setInterval(() => {
    document.body.style.background =
      "rgb(" + Math.random()*255 + "," + Math.random()*255 + "," + Math.random()*255 + ")";
  }, 300);
}

// 🎮 Level 2 (medium chaos)
function level2() {
  setInterval(() => {
    document.body.style.transform =
      "rotate(" + Math.random()*360 + "deg)";
  }, 500);

  setInterval(() => {
    let e = document.createElement("div");
    e.innerHTML = "⚠";
    e.style.position = "absolute";
    e.style.left = Math.random()*window.innerWidth + "px";
    e.style.top = Math.random()*window.innerHeight + "px";
    document.body.appendChild(e);
  }, 100);
}

// ☠ FINAL BOSS
function boss() {
  alert("YOU SHOULD NOT HAVE DONE THAT");

  // everything at once
  setInterval(() => {
    document.body.style.background =
      "rgb(" + Math.random()*255 + "," + Math.random()*255 + "," + Math.random()*255 + ")";
  }, 100);

  setInterval(() => {
    document.body.style.marginLeft = (Math.random()*50 - 25) + "px";
  }, 50);

  setInterval(() => {
    let e = document.createElement("div");
    e.innerHTML = "😈";
    e.style.position = "absolute";
    e.style.left = Math.random()*window.innerWidth + "px";
    e.style.top = Math.random()*window.innerHeight + "px";
    document.body.appendChild(e);
  }, 50);

  setInterval(() => {
    document.body.style.transform =
      "rotate(" + Math.random()*360 + "deg) scale(" + (Math.random()+0.5) + ")";
  }, 200);
}
// 🎮 Level 3 (glitch chaos)
function level3() {
  setInterval(() => {
    document.body.style.filter =
      "invert(" + Math.random() + ") blur(" + Math.random()*5 + "px)";
  }, 200);

  setInterval(() => {
    document.body.style.marginTop = (Math.random()*40 - 20) + "px";
  }, 100);
}

// 🎮 Level 4 (text invasion)
function level4() {
  setInterval(() => {
    let t = document.createElement("div");
    t.innerHTML = "ACCESS...";
    t.style.position = "absolute";
    t.style.left = Math.random()*window.innerWidth + "px";
    t.style.top = Math.random()*window.innerHeight + "px";
    t.style.color = "red";
    document.body.appendChild(t);
  }, 50);
}

// 🎮 Level 5 (screen break illusion)
function level5() {
  setInterval(() => {
    document.body.style.transform =
      "skew(" + (Math.random()*40-20) + "deg)";
  }, 200);

  setInterval(() => {
    document.body.style.border =
      Math.random()*30 + "px solid red";
  }, 300);
}
</script>

</body>
</html>
